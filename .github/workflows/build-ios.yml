name: Build iOS .ipa

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable

      - name: Cache pub-cache only
        # WHY 只 cache pub-cache 不 cache build/:
        #   build/ 含 stale 的 Pods/Podfile.lock,会让下次 build 用旧 pod
        #   缓存只到 pub-cache 避免 stale artifact 误导 build
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-pub-

      - name: Install Flutter deps
        run: flutter pub get

      - name: Precache iOS engine artifacts
        # WHY 显式 precache:首次 runner 启动可能没下 iOS artifacts,
        # flutter build ios 隐式触发会拉长 build 时间,且偶发失败显式更稳
        run: flutter precache --ios

      - name: Pod install (CocoaPods)
        # WHY 显式 pod install:虽然 flutter build ios 会自动调,
        # 但在 build 步骤前显式跑可以提前捕获 Podfile/Pod 解析错误,
        # 失败时给出明确栈而非嵌入 build 错误中难定位
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      # 0 成本方案:产出未签名 .ipa,由 AltStore 在 iPhone 上用免费 Apple ID 自动签名
      # 见 docs/product-design-v4.html §2.12 部署架构 + §8.48 AltStore 部署
      # WHY --dart-define=GIT_SHA: 让 Runner.ipa 主页底部显示 commit SHA(ADR-0023),
      #   装机后一眼对比 GitHub commit 列表,立刻知道是不是新版本
      - name: Build unsigned .ipa
        run: |
          flutter build ios --release --no-codesign --verbose \
            --dart-define=GIT_SHA=${{ github.sha }} \
            --dart-define=BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            2>&1 | tee build.log
          mkdir -p build/Payload
          cp -R build/ios/iphoneos/Runner.app build/Payload/
          cd build && zip -r ../Runner.ipa Payload
          ls -la ../Runner.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: jizhang-app-unsigned
          path: Runner.ipa
          retention-days: 7

      # WHY 始终上传日志(成功失败都传):
      #   失败日志 7 天(用户截图后我可以定位),成功日志 1 天(轻量)
      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            build/
            ios/Pods/Manifest.lock
            ios/Podfile.lock
          retention-days: 3
          if-no-files-found: ignore