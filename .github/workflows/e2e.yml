name: E2E (integration_test)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Stage 1 Day 9 引入(ADR-0014 配套):在 macOS runner 跑真 Flutter engine E2E,
# 覆盖 widget test 用 fake_async + 内存 SQLite 覆盖不到的真机场景。
#
# 3 个 E2E(每个 < 2 分钟,合计 < 6 分钟):
#   - e2e_record_flow_test.dart: 完整记账流程
#   - e2e_emoji_render_test.dart: 10 个默认分类 emoji 真引擎渲染
#   - e2e_persistence_test.dart:   app 暂停 + 恢复后数据仍在
#
# 复用 build-ios.yml 的 macos-14 + flutter 3.44.6 + pub-cache cache 模式,
# 失败时上传 build/ + logs 方便调试。
jobs:
  e2e-ios:
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      # 普通 unit + widget 测试先跑,挡住明显 bug,避免无谓启动 iOS Simulator
      - name: Unit + Widget tests
        run: flutter test

      # iOS Simulator UDID 抓取 — 匹配任意 iPhone,避免 Xcode 版本差异(15/16/17...)
      - name: Pick iOS Simulator
        id: pick-sim
        run: |
          SIM_UDID=$(xcrun simctl list devices available \
            | grep -oE "[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}" \
            | head -1)
          if [ -z "$SIM_UDID" ]; then
            echo "::error::找不到可用的 iOS Simulator"
            exit 1
          fi
          echo "sim_udid=$SIM_UDID" >> "$GITHUB_OUTPUT"
          echo "Using simulator UDID: $SIM_UDID"

      - name: Boot iOS Simulator
        run: |
          xcrun simctl boot "${{ steps.pick-sim.outputs.sim_udid }}" 2>&1 || echo "Already booted or boot skipped"
          # 等到 simulator 状态变为 Booted
          xcrun simctl bootstatus "${{ steps.pick-sim.outputs.sim_udid }}" -b

      - name: Run integration_test E2E
        run: |
          flutter test integration_test/ \
            -d "${{ steps.pick-sim.outputs.sim_udid }}" \
            --reporter expanded

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: |
            build/
            ~/.gradle/daemon/*.log
          retention-days: 3